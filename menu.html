<!DOCTYPE html><html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ordina il tuo Menù di Capodanno!</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap');
    body {
        font-family: 'Luckiest Guy', cursive;
        background: linear-gradient(to bottom, #fffa65, #ff6f91);
        color: #1a237e;
        text-align: center;
        padding: 30px;
        margin: 0;
    }
    h1 { font-size: 3em; color: #ff3d00; text-shadow: 3px 3px #ffd600; margin-bottom: 40px; }
    .section {
        background: turquoise;
        border-radius: 25px;
        padding: 30px;
        margin-bottom: 30px;
        box-shadow: 0 8px 15px rgba(0,0,0,0.3);
        transition: transform 0.3s;
    }
    .section:hover { transform: scale(1.02); }
    .choice-button {
        background: #ff1744;
        color: #fff;
        padding: 20px 40px;
        margin: 15px;
        border: none;
        border-radius: 20px;
        font-size: 24px;
        cursor: pointer;
        transition: transform 0.2s, background 0.2s;
    }
    .choice-button:hover { transform: scale(1.15); background: #ff9100; }
    .hidden { display: none; }
    .input-field { padding: 12px; font-size: 18px; width: 80%; margin-top: 15px; border-radius: 15px; border: 2px solid #ff3d00; text-align: center; }
    label { font-size: 20px; display: block; margin-top: 10px; cursor: pointer; }
    #riepilogoSection {
        background: #f00797;
        color: whitesmoke;
        text-shadow: 1px 1px 0 black, -1px -1px 0 black, 1px -1px 0 black, -1px 1px 0 black;
        padding-bottom: 60px;
    }
    #menuSceltoText {
        margin-top: 20px;
        text-align: left;
        display: flex;
        flex-direction: column;
        gap: 5px;
    }
</style><script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js">// --- SCRIPT DI PULIZIA FIREBASE (rimuove gli ID generati automaticamente) ---
function pulisciFirebase() {
    ['antipasti','primi','secondi','dolci'].forEach(cat => {
        db.ref(cat).once('value').then(snap => {
            snap.forEach(child => {
                if (child.key.startsWith('-')) {
                    db.ref(cat + '/' + child.key).remove();
                }
            });
        });
    });
    alert('Database pulito! ID casuali rimossi.');
}

// Puoi richiamare pulisciFirebase() dalla console del browser
</script><script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script><script>
    const firebaseConfig = {
      apiKey: "AIzaSyBUY-spueXuNmiUew_83Ww3BzP2_kQ0wT0",
      authDomain: "manu-dbc85.firebaseapp.com",
      databaseURL: "https://manu-dbc85-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "manu-dbc85",
      storageBucket: "manu-dbc85.firebasestorage.app",
      messagingSenderId: "1081477129666",
      appId: "1:1081477129666:web:e483d7ab2a26e5ed5ca25b",
      measurementId: "G-E1MNRMW7M5"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
</script></head>
<body><h1>🎉 Menù di Capodanno! 🎉</h1><!-- Pizza --><div class="section" id="pizzaSection">
    <p style="font-size:24px;">Vuoi la pizza?</p>
    <button class="choice-button" onclick="scegliPizza('yes')">Sì 🍕</button>
    <button class="choice-button" onclick="scegliPizza('no')">No ❌</button>
</div><!-- Pizza Casa/Fuori --><div class="section hidden" id="pizzaTipoSection">
    <p style="font-size:24px;">Fatta in casa o da fuori?</p>
    <button class="choice-button" onclick="scegliTipoPizza('casa')">Casa 🍽️</button>
    <button class="choice-button" onclick="scegliTipoPizza('fuori')">Fuori 🍴</button>
</div><!-- Pizza Gusti --><div class="section hidden" id="pizzaGustoSection">
    <p style="font-size:24px;">Scegli il gusto</p>
    <button class="choice-button" onclick="scegliGustoPizza('Margherita')">Margherita 🍕</button>
    <button class="choice-button" onclick="scegliGustoPizza('Quattro Stagioni')">4 Stagioni 🍕</button>
    <button class="choice-button" onclick="scegliGustoPizza('Funghi')">Funghi 🍄</button>
    <div>
        <input type="text" id="pizzaGustoAltro" class="input-field" placeholder="Altro gusto...">
        <button class="choice-button" onclick="scegliGustoPizza(document.getElementById('pizzaGustoAltro').value)">Invia</button>
    </div>
</div><!-- Antipasti --><div class="section hidden" id="antipastiSection">
    <p style="font-size:24px;">Scegli gli antipasti</p><label><input type="checkbox" class="antipasto" value="Cocktail Gamberi"> Cocktail Gamberi 🦐</label>
<label><input type="checkbox" class="antipasto" value="Tartine Salmone"> Tartine Salmone 🍣</label>
<label><input type="checkbox" class="antipasto" value="Vol-au-vent Fonduta"> Vol-au-vent Fonduta 🧀</label>

<div id="listaAntipastiDinamica"></div>

<input type="text" id="antipastoAltro" class="input-field" placeholder="Altro antipasto...">
<button class="choice-button" onclick="proseguiPrimo()">Avanti ➡️</button>

</div><!-- Primo --><div class="section hidden" id="primoSection">
    <p style="font-size:24px;">Scegli il primo</p><label><input type="radio" name="primo" value="Agnolotti Funghi"> Agnolotti ai funghi 🍄</label>
<label><input type="radio" name="primo" value="Tagliatelle Funghi"> Tagliatelle ai funghi 🍝</label>

<div id="listaPrimiDinamica"></div>

<input type="text" id="primoAltro" class="input-field" placeholder="Altro primo...">
<button class="choice-button" onclick="proseguiSecondo()">Avanti ➡️</button>

</div><!-- Secondo --><div class="section hidden" id="secondoSection">
    <p style="font-size:24px;">Scegli il secondo</p><label><input type="radio" name="secondo" value="Cappello Prete Barolo"> Cappello del prete al Barolo 🍖</label>

<div id="listaSecondiDinamica"></div>

<input type="text" id="secondoAltro" class="input-field" placeholder="Altro secondo...">
<button class="choice-button" onclick="proseguiDolce()">Avanti ➡️</button>

</div><!-- Dolce --><div class="section hidden" id="dolceSection">
    <p style="font-size:24px;">Scegli il dolce</p><label><input type="radio" name="dolce" value="Pandoro"> Pandoro 🎂</label>
<label><input type="radio" name="dolce" value="Tiramisù"> Tiramisù 🍮</label>

<div id="listaDolciDinamica"></div>

<input type="text" id="dolceAltro" class="input-field" placeholder="Altro dolce...">
<button class="choice-button" onclick="proseguiFuochi()">Avanti ➡️</button>

</div><!-- Fuochi --><div class="section hidden" id="fuochiSection">
    <p style="font-size:24px;">Vuoi i fuochi d'artificio?</p>
    <button class="choice-button" onclick="scegliFuochi('Sì')">Sì 🎆</button>
    <button class="choice-button" onclick="scegliFuochi('No')">No ❌</button>
</div><!-- Riepilogo --><div class="section hidden" id="riepilogoSection">
    <h2 style="font-size:28px;">Riepilogo Ordine</h2>
    <p id="riepilogoText" style="font-size:20px;"></p>
    <button class="choice-button" onclick="mostraMenuVotato()">📊 Vedi il menu più votato</button>
</div><!-- Menu più votato --><div class="section hidden" id="menuVotatoSection">
    <h2 style="font-size:28px;">Menu più votato 🎉</h2>
    <div id="menuSceltoText" style="font-size:20px;"></div>
</div><script>
function getNome(){ return localStorage.getItem('nome') || "Anonimo"; }

// Se l'utente inserisce il nome "reset", viene avviata la pulizia totale del database
if (getNome() === 'reset') {
    db.ref('antipasti').remove();
    db.ref('primi').remove();
    db.ref('secondi').remove();
    db.ref('dolci').remove();
    db.ref('ordini').remove();
    alert('Database completamente resettato!');
}

let ordine = { nome:getNome(), pizza:'', tipoPizza:'', pizzaGusto:'', antipasti:[], primo:'', secondo:'', dolce:'', fuochi:'' };

function caricaLista(path, containerId, tipo){
    db.ref(path).once('value').then(snapshot => {
        let cont = document.getElementById(containerId);
        cont.innerHTML = '';
        snapshot.forEach(child => {
            let nome = child.key;
            if (nome.startsWith('-')) return; // IGNORA ID CASUALI PUSH
            let label = document.createElement('label');(child =>{
            let nome = child.key;
            let lbl = document.createElement('label');
            if(tipo==='checkbox') lbl.innerHTML = `<input type='checkbox' value='${nome}'> ${nome}`;
            else lbl.innerHTML = `<input type='radio' name='${path}' value='${nome}'> ${nome}`;
            cont.appendChild(lbl);
        })
    })
}

function scegliPizza(s){ ordine.pizza=s; document.getElementById('pizzaSection').classList.add('hidden'); if(s==='yes') document.getElementById('pizzaTipoSection').classList.remove('hidden'); else { caricaLista('antipasti','listaAntipastiDinamica','checkbox'); document.getElementById('antipastiSection').classList.remove('hidden'); }}

function scegliTipoPizza(s){ ordine.tipoPizza=s; document.getElementById('pizzaTipoSection').classList.add('hidden'); if(s==='casa') document.getElementById('pizzaGustoSection').classList.remove('hidden'); else { caricaLista('antipasti','listaAntipastiDinamica','checkbox'); document.getElementById('antipastiSection').classList.remove('hidden'); }}

function scegliGustoPizza(g){ if(!g) return; ordine.pizzaGusto=g; document.getElementById('pizzaGustoSection').classList.add('hidden'); caricaLista('antipasti','listaAntipastiDinamica','checkbox'); document.getElementById('antipastiSection').classList.remove('hidden'); }

function proseguiPrimo(){
    let base = Array.from(document.querySelectorAll('.antipasto:checked')).map(x=>x.value);
    let dyn = Array.from(document.querySelectorAll('#listaAntipastiDinamica input:checked')).map(x=>x.value);
    let altro = document.getElementById('antipastoAltro').value.trim();
    if(altro){ db.ref('antipasti/'+altro).set(1); base.push(altro);}    
    ordine.antipasti = base.concat(dyn);

    document.getElementById('antipastiSection').classList.add('hidden');
    caricaLista('primi','listaPrimiDinamica','radio');
    document.getElementById('primoSection').classList.remove('hidden');
}

function proseguiSecondo(){
    let sel = document.querySelector('input[name="primi"]:checked');
    let altro = document.getElementById('primoAltro').value.trim();
    ordine.primo = sel ? sel.value : altro;
    if(altro) db.ref('primi/'+altro).set(1);

    document.getElementById('primoSection').classList.add('hidden');
    caricaLista('secondi','listaSecondiDinamica','radio');
    document.getElementById('secondoSection').classList.remove('hidden');
}

function proseguiDolce(){
    let sel = document.querySelector('input[name="secondi"]:checked');
    let altro = document.getElementById('secondoAltro').value.trim();
    ordine.secondo = sel ? sel.value : altro;
    if(altro) db.ref('secondi/'+altro).set(1);

    document.getElementById('secondoSection').classList.add('hidden');
    caricaLista('dolci','listaDolciDinamica','radio');
    document.getElementById('dolceSection').classList.remove('hidden');
}

function proseguiFuochi(){
    let sel = document.querySelector('input[name="dolci"]:checked');
    let altro = document.getElementById('dolceAltro').value.trim();
    ordine.dolce = sel ? sel.value : altro;
    if(altro) db.ref('dolci/'+altro).set(1);

    document.getElementById('dolceSection').classList.add('hidden');
    document.getElementById('fuochiSection').classList.remove('hidden');
}

function scegliFuochi(s){ ordine.fuochi=s; document.getElementById('fuochiSection').classList.add('hidden'); document.getElementById('riepilogoSection').classList.remove('hidden'); mostraRiepilogo(); db.ref('ordini').push(ordine); }

function mostraRiepilogo(){
    document.getElementById('riepilogoText').innerText = `Nome: ${ordine.nome}
Pizza: ${ordine.pizza==='yes'?(ordine.tipoPizza==='casa'?ordine.pizzaGusto:'Pizza da fuori'):'Nessuna'}
Antipasti: ${ordine.antipasti.join(', ')}
Primo: ${ordine.primo}
Secondo: ${ordine.secondo}
Dolce: ${ordine.dolce}
Fuochi: ${ordine.fuochi}`;
}

function mostraMenuVotato(){
    document.getElementById('menuVotatoSection').classList.remove('hidden');
    db.ref().once('value').then(s=>{
        let m=s.val(), t='';
        ['antipasti','primi','secondi','dolci'].forEach(cat=>{ if(m[cat]) t += `${cat}: ${Object.keys(m[cat]).join(', ')}\n`; });
        document.getElementById('menuSceltoText').innerText = t || "Nessun menu votato";
    })
}
</script></body>
</html>
