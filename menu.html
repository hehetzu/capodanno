<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menù Capodanno</title>
<style>
  body { font-family: Arial, sans-serif; padding: 20px; }
  .hidden { display: none; }
  .section { margin-bottom: 20px; }
  label { display: block; margin: 5px 0; }
</style>
</head>
<body>
<h1>Menù di Capodanno</h1>

<div class="section">
  <label>Nome: <input type="text" id="nome"></label>
</div>

<div class="section">
  <h3>Pizza</h3>
  <label><input type="checkbox" id="pizza"> Pizza</label>
</div>

<div class="section" id="antipasti-section">
  <h3>Antipasti</h3>
  <label><input type="checkbox" class="antipasto"> Antipasto 1</label>
  <label><input type="checkbox" class="antipasto"> Antipasto 2</label>
  <label><input type="checkbox" class="antipasto"> Antipasto 3</label>
  <label>Altro: <input type="text" id="altro-antipasto"></label>
</div>

<div class="section" id="primi-section">
  <h3>Primi</h3>
  <label><input type="checkbox" class="primo"> Primo 1</label>
  <label><input type="checkbox" class="primo"> Primo 2</label>
  <label>Altro: <input type="text" id="altro-primo"></label>
</div>

<div class="section" id="secondi-section">
  <h3>Secondi</h3>
  <label><input type="checkbox" class="secondo"> Secondo 1</label>
  <label><input type="checkbox" class="secondo"> Secondo 2</label>
  <label>Altro: <input type="text" id="altro-secondo"></label>
</div>

<div class="section" id="dolci-section">
  <h3>Dolci</h3>
  <label><input type="checkbox" class="dolce"> Dolce 1</label>
  <label><input type="checkbox" class="dolce"> Dolce 2</label>
  <label>Altro: <input type="text" id="altro-dolce"></label>
</div>

<div class="section">
  <button id="salva">Salva Scelte</button>
</div>

<script>
const nomeInput = document.getElementById('nome');
const pizzaCheckbox = document.getElementById('pizza');

const antipastiSection = document.getElementById('antipasti-section');
const primiSection = document.getElementById('primi-section');
const secondiSection = document.getElementById('secondi-section');
const dolciSection = document.getElementById('dolci-section');

const salvaBtn = document.getElementById('salva');

function aggiornaSelezionePizza() {
  if (pizzaCheckbox.checked) {
    antipastiSection.classList.add('hidden');
    primiSection.classList.add('hidden');
    secondiSection.classList.add('hidden');
    dolciSection.classList.add('hidden');
  } else {
    antipastiSection.classList.remove('hidden');
    primiSection.classList.remove('hidden');
    secondiSection.classList.remove('hidden');
    dolciSection.classList.remove('hidden');
  }
}

// Controllo pizza
pizzaCheckbox.addEventListener('change', aggiornaSelezionePizza);

// Funzione di salvataggio
salvaBtn.addEventListener('click', () => {
  const nome = nomeInput.value.trim();
  if (nome.toLowerCase() === "reset") {
    localStorage.clear();
    alert("Tutte le scelte sono state resettate!");
    return;
  }

  const scelte = {
    pizza: pizzaCheckbox.checked,
    antipasti: [],
    primi: [],
    secondi: [],
    dolci: []
  };

  document.querySelectorAll('.antipasto').forEach(a => { if(a.checked) scelte.antipasti.push(a.nextSibling.textContent.trim()) });
  if(document.getElementById('altro-antipasto').value.trim() !== "") scelte.antipasti.push(document.getElementById('altro-antipasto').value.trim());

  document.querySelectorAll('.primo').forEach(p => { if(p.checked) scelte.primi.push(p.nextSibling.textContent.trim()) });
  if(document.getElementById('altro-primo').value.trim() !== "") scelte.primi.push(document.getElementById('altro-primo').value.trim());

  document.querySelectorAll('.secondo').forEach(s => { if(s.checked) scelte.secondi.push(s.nextSibling.textContent.trim()) });
  if(document.getElementById('altro-secondo').value.trim() !== "") scelte.secondi.push(document.getElementById('altro-secondo').value.trim());

  document.querySelectorAll('.dolce').forEach(d => { if(d.checked) scelte.dolci.push(d.nextSibling.textContent.trim()) });
  if(document.getElementById('altro-dolce').value.trim() !== "") scelte.dolci.push(document.getElementById('altro-dolce').value.trim());

  localStorage.setItem(nome, JSON.stringify(scelte));
  alert("Scelta salvata!");
});

// Inizializza visibilità
aggiornaSelezionePizza();
</script>

</body>
</html>
