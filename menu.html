<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ordina il tuo Menù di Capodanno!</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap');
    body {
        font-family: 'Luckiest Guy', cursive;
        background: linear-gradient(to bottom, #fffa65, #ff6f91);
        color: #1a237e;
        text-align: center;
        padding: 30px;
        margin: 0;
    }
    h1 { font-size: 3em; color: #ff3d00; text-shadow: 3px 3px #ffd600; margin-bottom: 40px; }
    .section {
        background: turquoise;
        border-radius: 25px;
        padding: 30px;
        margin-bottom: 30px;
        box-shadow: 0 8px 15px rgba(0,0,0,0.3);
        transition: transform 0.3s;
    }
    .section:hover { transform: scale(1.02); }
    .choice-button {
        background: #ff1744;
        color: #fff;
        padding: 20px 40px;
        margin: 15px;
        border: none;
        border-radius: 20px;
        font-size: 24px;
        cursor: pointer;
        transition: transform 0.2s, background 0.2s;
    }
    .choice-button:hover { transform: scale(1.15); background: #ff9100; }
    .hidden { display: none; }
    .input-field { padding: 12px; font-size: 18px; width: 80%; margin-top: 15px; border-radius: 15px; border: 2px solid #ff3d00; text-align: center; }
    label { font-size: 20px; display: block; margin-top: 10px; cursor: pointer; }
    #riepilogoSection {
        background: #f00797;
        color: whitesmoke; 
        text-shadow:1px 1px 0 black,-1px -1px 0 black,1px -1px 0 black,-1px 1px 0 black;
        padding-bottom: 60px;
    }
    #menuSceltoText {
        margin-top: 20px;
        text-align: left;
        display: flex;
        flex-direction: column;
        gap: 5px;
    }
</style>
<!-- Firebase SDK compat -->
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
<script>
    const firebaseConfig = {
      apiKey: "AIzaSyBUY-spueXuNmiUew_83Ww3BzP2_kQ0wT0",
      authDomain: "manu-dbc85.firebaseapp.com",
      databaseURL: "https://manu-dbc85-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "manu-dbc85",
      storageBucket: "manu-dbc85.firebasestorage.app",
      messagingSenderId: "1081477129666",
      appId: "1:1081477129666:web:e483d7ab2a26e5ed5ca25b",
      measurementId: "G-E1MNRMW7M5"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
</script>
</head>
<body>

<h1>🎉 Menù di Capodanno! 🎉</h1>

<!-- Pizza -->
<div class="section" id="pizzaSection">
    <p style="font-size:24px;">Vuoi la pizza?</p>
    <button class="choice-button" onclick="scegliPizza('yes')">Sì 🍕</button>
    <button class="choice-button" onclick="scegliPizza('no')">No ❌</button>
</div>

<!-- Pizza Casa/Fuori -->
<div class="section hidden" id="pizzaTipoSection">
    <p style="font-size:24px;">Fatta in casa o da fuori?</p>
    <button class="choice-button" onclick="scegliTipoPizza('casa')">Casa 🍽️</button>
    <button class="choice-button" onclick="scegliTipoPizza('fuori')">Fuori 🍴</button>
</div>

<!-- Pizza Gusti -->
<div class="section hidden" id="pizzaGustoSection">
    <p style="font-size:24px;">Scegli il gusto</p>
    <button class="choice-button" onclick="scegliGustoPizza('Margherita')">Margherita 🍕</button>
    <button class="choice-button" onclick="scegliGustoPizza('Quattro Stagioni')">4 Stagioni 🍕</button>
    <button class="choice-button" onclick="scegliGustoPizza('Funghi')">Funghi 🍄</button>
    <div>
        <input type="text" id="pizzaGustoAltro" class="input-field" placeholder="Altro gusto...">
        <button class="choice-button" onclick="scegliGustoPizza(document.getElementById('pizzaGustoAltro').value)">Invia</button>
    </div>
</div>

<!-- Antipasti -->
<div class="section hidden" id="antipastiSection">
    <p style="font-size:24px;">Scegli gli antipasti</p>
    <label><input type="checkbox" class="antipasto" value="Cocktail Gamberi"> Cocktail Gamberi 🦐</label>
    <label><input type="checkbox" class="antipasto" value="Tartine Salmone"> Tartine Salmone 🍣</label>
    <label><input type="checkbox" class="antipasto" value="Vol-au-vent Fonduta"> Vol-au-vent Fonduta 🧀</label>
    <input type="text" id="antipastoAltro" class="input-field" placeholder="Altro antipasto...">
    <button class="choice-button" onclick="proseguiPrimo()">Avanti ➡️</button>
</div>

<!-- Primo -->
<div class="section hidden" id="primoSection">
    <p style="font-size:24px;">Scegli il primo</p>
    <label><input type="radio" name="primo" value="Agnolotti Funghi"> Agnolotti ai funghi 🍄</label>
    <label><input type="radio" name="primo" value="Tagliatelle Funghi"> Tagliatelle ai funghi 🍝</label>
    <input type="text" id="primoAltro" class="input-field" placeholder="Altro primo...">
    <button class="choice-button" onclick="proseguiSecondo()">Avanti ➡️</button>
</div>

<!-- Secondo -->
<div class="section hidden" id="secondoSection">
    <p style="font-size:24px;">Scegli il secondo</p>
    <label><input type="radio" name="secondo" value="Cappello Prete Barolo"> Cappello del prete al Barolo 🍖</label>
    <input type="text" id="secondoAltro" class="input-field" placeholder="Altro secondo...">
    <button class="choice-button" onclick="proseguiDolce()">Avanti ➡️</button>
</div>

<!-- Dolce -->
<div class="section hidden" id="dolceSection">
    <p style="font-size:24px;">Scegli il dolce</p>
    <label><input type="radio" name="dolce" value="Pandoro"> Pandoro 🎂</label>
    <label><input type="radio" name="dolce" value="Tiramisù"> Tiramisù 🍮</label>
    <input type="text" id="dolceAltro" class="input-field" placeholder="Altro dolce...">
    <button class="choice-button" onclick="proseguiFuochi()">Avanti ➡️</button>
</div>

<!-- Fuochi -->
<div class="section hidden" id="fuochiSection">
    <p style="font-size:24px;">Vuoi i fuochi d'artificio?</p>
    <button class="choice-button" onclick="scegliFuochi('Sì')">Sì 🎆</button>
    <button class="choice-button" onclick="scegliFuochi('No')">No ❌</button>
</div>

<!-- Riepilogo -->
<div class="section hidden" id="riepilogoSection">
    <h2 style="font-size:28px;">Riepilogo Ordine</h2>
    <p id="riepilogoText" style="font-size:20px;"></p>
    <button class="choice-button" onclick="mostraMenuVotato()">📊 Vedi il menu più votato</button>
</div>

<!-- Menu più votato -->
<div class="section hidden" id="menuVotatoSection">
    <h2 style="font-size:28px;">Menu più votato 🎉</h2>
    <div id="menuSceltoText" style="font-size:20px;"></div>
</div>

<script>
function getNome() {
    return localStorage.getItem('nome') || "Anonimo";
}

let ordine = {nome: getNome(), pizza:'', tipoPizza:'', pizzaGusto:'', antipasti:[], primo:'', secondo:'', dolce:'', fuochi:''};

function scegliPizza(scelta){
    ordine.pizza = scelta;
    document.getElementById('pizzaSection').classList.add('hidden');
    if(scelta==='yes') document.getElementById('pizzaTipoSection').classList.remove('hidden');
    else document.getElementById('antipastiSection').classList.remove('hidden');
}

function scegliTipoPizza(tipo){
    ordine.tipoPizza = tipo;
    document.getElementById('pizzaTipoSection').classList.add('hidden');
    if(tipo==='casa') document.getElementById('pizzaGustoSection').classList.remove('hidden');
    else document.getElementById('antipastiSection').classList.remove('hidden');
}

function scegliGustoPizza(gusto){
    if(!gusto) return;
    ordine.pizzaGusto = gusto;
    document.getElementById('pizzaGustoSection').classList.add('hidden');
    document.getElementById('antipastiSection').classList.remove('hidden');
}

function proseguiPrimo(){
    let selezionati = Array.from(document.querySelectorAll('.antipasto:checked')).map(c=>c.value);
    let altro = document.getElementById('antipastoAltro').value;
    if(altro) selezionati.push(altro);
    ordine.antipasti = selezionati;
    if(altro) db.ref('antipasti/'+altro).set(1);
    document.getElementById('antipastiSection').classList.add('hidden');
    document.getElementById('primoSection').classList.remove('hidden');
}

function proseguiSecondo(){
    let selezionato = document.querySelector('input[name="primo"]:checked');
    let alt = document.getElementById('primoAltro').value;
    ordine.primo = selezionato ? selezionato.value : alt;
    if(alt) db.ref('primi/'+alt).set(1);
    document.getElementById('primoSection').classList.add('hidden');
    document.getElementById('secondoSection').classList.remove('hidden');
}

function proseguiDolce(){
    let selezionato = document.querySelector('input[name="secondo"]:checked');
    let alt = document.getElementById('secondoAltro').value;
    ordine.secondo = selezionato ? selezionato.value : alt;
    if(alt) db.ref('secondi/'+alt).set(1);
    document.getElementById('secondoSection').classList.add('hidden');
    document.getElementById('dolceSection').classList.remove('hidden');
}

function proseguiFuochi(){
    let selezionato = document.querySelector('input[name="dolce"]:checked');
    let alt = document.getElementById('dolceAltro').value;
    ordine.dolce = selezionato ? selezionato.value : alt;
    if(alt) db.ref('dolci/'+alt).set(1);
    document.getElementById('dolceSection').classList.add('hidden');
    document.getElementById('fuochiSection').classList.remove('hidden');
}

function scegliFuochi(scelta){
    ordine.fuochi = scelta;
    document.getElementById('fuochiSection').classList.add('hidden');
    document.getElementById('riepilogoSection').classList.remove('hidden');
    mostraRiepilogo();
    db.ref('ordini').push(ordine);
    inviaTelegram(); // Invio automatico
}

function mostraRiepilogo(){
    let testo = `Nome: ${ordine.nome}
Pizza🍕: ${ordine.pizza==='yes'?ordine.tipoPizza==='casa'?ordine.pizzaGusto:'Pizza da fuori':'Nessuna pizza'}
Antipasti🥗 : ${ordine.antipasti.join(', ') || 'Nessuno'}
Primo🍝 : ${ordine.primo || 'Nessuno'}
Secondo🍖 : ${ordine.secondo || 'Nessuno'}
Dolce🍰 : ${ordine.dolce || 'Nessuno'}
Fuochi🎆 : ${ordine.fuochi}`;
    document.getElementById('riepilogoText').innerText = testo;
}

function mostraMenuVotato(){
    document.getElementById('menuVotatoSection').classList.remove('hidden');
    db.ref().once('value').then(snapshot => {
        let menu = snapshot.val();
        let testo = '';
        ['antipasti','primi','secondi','dolci'].forEach(cat => {
            if(menu[cat]){
                let items = Object.entries(menu[cat]).map(([key,val]) => key);
                testo += `${cat.charAt(0).toUpperCase()+cat.slice(1)}: ${items.join(', ')}\n`;
            }
        });
        document.getElementById('menuSceltoText').innerText = testo || "Nessun menu ancora votato";
    });
}

function inviaTelegram(){
    const token = '8512557446:AAE6qdPgF8rsgc3G4aHTIEWNgjji64naDZc';
    const chat_id = '147586543';
    const text = encodeURIComponent(
        `🎉  ${ordine.nome} 🎉\n`+
        `Pizza🍕: ${ordine.pizza==='yes'?ordine.tipoPizza==='casa'?ordine.pizzaGusto:'Pizza da fuori':'Nessuna pizza'}\n`+
        `Antipasti🥗: ${ordine.antipasti.join(', ') || 'Nessuno'}\n`+
        `Primo🍝: ${ordine.primo || 'Nessuno'}\n`+
        `Secondo🍖: ${ordine.secondo || 'Nessuno'}\n`+
        `Dolce🍰: ${ordine.dolce || 'Nessuno'}\n`+
        `Fuochi🎆: ${ordine.fuochi}`
    );

    fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${text}`)
        .then(res => res.json())
        .catch(err => console.error("Errore invio Telegram:", err));
}
</script>

</body>
</html>
