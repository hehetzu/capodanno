<script>
function getNome() {
    let nome = localStorage.getItem('nome') || "Anonimo";
    if(nome.toLowerCase() === 'reset'){
        resetDatabase();
        localStorage.removeItem('nome');
        return "Anonimo";
    }
    return nome;
}

let ordine = {nome: getNome(), pizza:'', tipoPizza:'', pizzaGusto:'', antipasti:[], primo:'', secondo:'', dolce:'', fuochi:''};

function scegliPizza(scelta){
    ordine.pizza = scelta;
    document.getElementById('pizzaSection').classList.add('hidden');
    if(scelta==='yes') document.getElementById('pizzaTipoSection').classList.remove('hidden');
    else document.getElementById('antipastiSection').classList.remove('hidden');
}

function scegliTipoPizza(tipo){
    ordine.tipoPizza = tipo;
    document.getElementById('pizzaTipoSection').classList.add('hidden');
    if(tipo==='casa') {
        document.getElementById('pizzaGustoSection').classList.remove('hidden');
    } else {
        // Se l'utente sceglie pizza (anche 'fuori'), salta antipasti/primo/secondo
        // e va direttamente a dolce
        document.getElementById('dolceSection').classList.remove('hidden');
    }
}

function scegliGustoPizza(gusto){
    if(!gusto) return;
    ordine.pizzaGusto = gusto;
    document.getElementById('pizzaGustoSection').classList.add('hidden');
    // Salta antipasti/primo/secondo: mostra direttamente la sezione dolce
    document.getElementById('dolceSection').classList.remove('hidden');
}

function proseguiPrimo(){
    let selezionati = Array.from(document.querySelectorAll('.antipasto:checked')).map(c=>c.value);
    let altro = document.getElementById('antipastoAltro').value;
    if(altro) selezionati.push(altro);
    ordine.antipasti = selezionati;
    if(altro) db.ref('antipasti/'+altro).set(1);
    document.getElementById('antipastiSection').classList.add('hidden');
    document.getElementById('primoSection').classList.remove('hidden');
}

function proseguiSecondo(){
    let selezionato = document.querySelector('input[name="primo"]:checked');
    let alt = document.getElementById('primoAltro').value;
    ordine.primo = selezionato ? selezionato.value : alt;
    if(alt) db.ref('primi/'+alt).set(1);
    document.getElementById('primoSection').classList.add('hidden');
    document.getElementById('secondoSection').classList.remove('hidden');
}

function proseguiDolce(){
    let selezionato = document.querySelector('input[name="secondo"]:checked');
    let alt = document.getElementById('secondoAltro').value;
    ordine.secondo = selezionato ? selezionato.value : alt;
    if(alt) db.ref('secondi/'+alt).set(1);
    document.getElementById('secondoSection').classList.add('hidden');
    document.getElementById('dolceSection').classList.remove('hidden');
}

function proseguiFuochi(){
    let selezionato = document.querySelector('input[name="dolce"]:checked');
    let alt = document.getElementById('dolceAltro').value;
    ordine.dolce = selezionato ? selezionato.value : alt;
    if(alt) db.ref('dolci/'+alt).set(1);
    document.getElementById('dolceSection').classList.add('hidden');
    document.getElementById('fuochiSection').classList.remove('hidden');
}

function scegliFuochi(scelta){
    if(typeof scelta === 'string' && scelta.toLowerCase() === 'sì' || scelta === 'Si' || scelta === 'Sì'){
        // mostra opzioni e canvas per anteprima
        document.getElementById('fuochiOptions').classList.remove('hidden');
        const c = document.getElementById('fireworksCanvas'); if(c) c.classList.remove('hidden');
        ordine.fuochi = 'Sì (in attesa scelta)';
        return;
    }
    // No -> procedi al riepilogo
    ordine.fuochi = scelta;
    document.getElementById('fuochiSection').classList.add('hidden');
    document.getElementById('riepilogoSection').classList.remove('hidden');
    mostraRiepilogo();
    db.ref('ordini').push(ordine);
    inviaTelegram(); // Invio automatico
}

// Quando l'utente sceglie un tipo di fuochi: mostra anteprima animata e poi finalizza ordine
function chooseFuochiType(tipo){
    const canvas = document.getElementById('fireworksCanvas');
    if(!canvas) return;
    // mostra badge scelta
    ordine.fuochi = tipo;
    // lunghezza animazione in ms
    const durations = { 'Piccolo':2500, 'Medio':4200, 'Grande':6200, 'Personalizzato':7000 };
    const dur = durations[tipo] || 4000;
    animateFireworks(canvas, tipo, dur);
    // dopo animazione procedi al riepilogo
    setTimeout(()=>{
        document.getElementById('fuochiOptions').classList.add('hidden');
        canvas.classList.add('hidden');
        document.getElementById('fuochiSection').classList.add('hidden');
        document.getElementById('riepilogoSection').classList.remove('hidden');
        mostraRiepilogo();
        db.ref('ordini').push(ordine);
        inviaTelegram();
    }, dur + 300);
}

// Semplice animazione canvas per fuochi d'artificio (leggera, senza librerie)
function animateFireworks(canvas, tipo, duration){
    const ctx = canvas.getContext('2d');
    let w = canvas.width = canvas.clientWidth * (window.devicePixelRatio || 1);
    let h = canvas.height = (canvas.clientHeight || 300) * (window.devicePixelRatio || 1);
    ctx.clearRect(0,0,w,h);
    const particles = [];
    const now = Date.now();
    const endAt = now + duration;
    // spawn count based on tipo
    let bursts = 0;
    if(tipo==='Piccolo') bursts = 3;
    else if(tipo==='Medio') bursts = 6;
    else bursts = 10;
    for(let b=0;b<bursts;b++){
        const cx = (0.15 + Math.random()*0.7) * w;
        const cy = (0.15 + Math.random()*0.5) * h;
        const count = 12 + Math.floor(Math.random()*28);
        for(let i=0;i<count;i++){
            const angle = Math.random()*Math.PI*2;
            const speed = 1 + Math.random()*4 + (tipo==='Grande'?2:0);
            particles.push({ x:cx, y:cy, vx:Math.cos(angle)*speed, vy:Math.sin(angle)*speed, life: 800 + Math.random()*900, born: Date.now() + b*200, color: randColor() });
        }
    }
    function loop(){
        ctx.globalCompositeOperation = 'source-over';
        ctx.fillStyle = 'rgba(3,3,10,0.18)';
        ctx.fillRect(0,0,w,h);
        const t = Date.now();
        for(let p of particles){
            if(t < p.born) continue;
            const age = t - p.born;
            if(age > p.life) continue;
            const k = 1 - age / p.life;
            // simple physics
            p.vy += 0.02; // gravity
            p.x += p.vx * (window.devicePixelRatio || 1);
            p.y += p.vy * (window.devicePixelRatio || 1);
            ctx.globalCompositeOperation = 'lighter';
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.arc(p.x, p.y, Math.max(1, 3 * k), 0, Math.PI*2);
            ctx.fill();
        }
        if(Date.now() < endAt) requestAnimationFrame(loop);
        else {
            // fade out
            let alpha = 1.0;
            const fade = setInterval(()=>{
                ctx.fillStyle = `rgba(3,3,10,${0.08})`;
                ctx.fillRect(0,0,w,h);
                alpha -= 0.08;
                if(alpha <= 0){ clearInterval(fade); ctx.clearRect(0,0,w,h); }
            }, 80);
        }
    }
    loop();
    function randColor(){
        const cols = ['#ff4d4f','#ffd166','#4dd0e1','#7c4dff','#ff6f91','#ffe066','#8bc34a'];
        return cols[Math.floor(Math.random()*cols.length)];
    }
}

// Helper non invasivo per testare il flusso senza manipolare il DOM.
// Uso: in console del browser chiamare `simulateFlow({pizza:'yes', tipo:'fuori', gusto:null})`
// Restituisce l'array di sezioni che verrebbero mostrate in sequenza.
function simulateFlow(choices){
    // choices: { pizza: 'yes'|'no', tipo: 'casa'|'fuori'|null, gusto: string|null }
    let seq = [];
    if(choices.pizza === 'yes'){
        seq.push('pizzaSection');
        seq.push('pizzaTipoSection');
        if(choices.tipo === 'casa'){
            seq.push('pizzaGustoSection');
            if(choices.gusto) seq.push('dolceSection');
            else seq.push('pizzaGustoSection (waiting for gusto)');
        } else {
            // tipo 'fuori' o altro: salta direttamente a dolce
            seq.push('dolceSection');
        }
    } else {
        seq.push('pizzaSection');
        seq.push('antipastiSection');
        seq.push('primoSection');
        seq.push('secondoSection');
        seq.push('dolceSection');
    }
    // fuochi sempre dopo dolce
    if(seq.indexOf('dolceSection') !== -1) seq.push('fuochiSection');
    return seq;
}

Pizza🍕: ${ordine.pizza==='yes'?ordine.tipoPizza==='casa'?ordine.pizzaGusto:'Pizza da fuori':'Nessuna pizza'}
Antipasti🥗 : ${ordine.antipasti.join(', ') || 'Nessuno'}
Primo🍝 : ${ordine.primo || 'Nessuno'}
Secondo🍖 : ${ordine.secondo || 'Nessuno'}
Dolce🍰 : ${ordine.dolce || 'Nessuno'}
Fuochi🎆 : ${ordine.fuochi}`;
    document.getElementById('riepilogoText').innerText = testo;
}

function mostraMenuVotato(){
    document.getElementById('menuVotatoSection').classList.remove('hidden');
    db.ref().once('value').then(snapshot => {
        let menu = snapshot.val();
        let testo = '';
        ['antipasti','primi','secondi','dolci'].forEach(cat => {
            if(menu[cat]){
                let items = Object.entries(menu[cat]).map(([key,val]) => key);
                testo += `${cat.charAt(0).toUpperCase()+cat.slice(1)}: ${items.join(', ')}\n`;
            }
        });
        document.getElementById('menuSceltoText').innerText = testo || "Nessun menu ancora votato";
    });
}

function showToast(msg, type='info'){
    const container = document.getElementById('toast');
    if(!container) return;
    const toast = document.createElement('div');
    toast.className = 'toast-item';
    const bgMap = {success:'#4caf50',error:'#f44336',warning:'#ff9800',info:'#2196f3'};
    toast.style.background = bgMap[type] || '#2196f3';
    toast.textContent = msg;
    container.appendChild(toast);
    // trigger entrance animation
    toast.style.animation = 'toastIn 360ms cubic-bezier(.2,.9,.2,1) forwards';
    // auto-dismiss with exit animation
    setTimeout(()=>{
        toast.style.animation = 'toastOut 300ms ease forwards';
        setTimeout(()=>{ if(container.contains(toast)) container.removeChild(toast); }, 300);
    }, 3000);
}

function resetDatabase(){
    if(!confirm('Cancellare tutte le scelte personalizzate? Rimarranno solo le opzioni di default.')) return;
    const categories = ['pizza','antipasti','primi','secondi','dolci'];
    let count = 0;
    categories.forEach(cat=>{
        db.ref(cat).remove().then(()=>{ count++; if(count === categories.length) showToast('Database azzerato','success'); });
    });
}



function sanitizeKey(name){ return name.replace(/[.#$\[\]\/]/g,'-'); }

function showAltInput(cat){
    const map = { pizza:'pizzaAltInput', antipasti:'antipastiAltInput', primi:'primiAltInput', secondi:'secondiAltInput', dolci:'dolciAltInput' };
    const id = map[cat];
    if(!id) return;
    const el = document.getElementById(id);
    if(!el) return;
    el.classList.remove('hidden');
}

function addCustom(cat){
    let name = '';
    if(cat==='pizza') name = document.getElementById('pizzaGustoAltro').value.trim();
    else if(cat==='antipasti') name = document.getElementById('antipastoAltro').value.trim();
    else if(cat==='primi') name = document.getElementById('primoAltro').value.trim();
    else if(cat==='secondi') name = document.getElementById('secondoAltro').value.trim();
    else if(cat==='dolci') name = document.getElementById('dolceAltro').value.trim();
    if(!name){ showToast('Inserisci un nome valido','error'); return; }
    const key = sanitizeKey(encodeURIComponent(name));
    const node = cat;
    function doWrite(){
        return db.ref(node + '/' + key).once('value').then(snap=>{
            if(snap.exists()){
                showToast('Questa voce esiste già','warning');
                addOptionToUI(cat, name);
                return Promise.resolve('exists');
            }
            return db.ref(node + '/' + key).set(1).then(()=>{
                showToast('Voce aggiunta con successo','success');
                addOptionToUI(cat, name);
            });
        });
    }
    doWrite().catch(err=>{ console.error('Firebase write error', err); showToast('Errore durante il salvataggio sul server','error'); });
}

function addOptionToUI(cat, name){
    if(!name) return;
    if(cat === 'antipasti'){
        const section = document.getElementById('antipastiSection');
        // Controlla globalmente se esiste già (in tutta la sezione)
        if(section && !Array.from(section.querySelectorAll('.antipasto')).some(i=>i.value===name)){
            const label = document.createElement('label');
            label.innerHTML = `<input type="checkbox" class="antipasto" value="${name}"> ${name}`;
            let inserted = false;
            for(let child of section.querySelectorAll('label')){
                let existing = child.textContent.trim();
                if(name.toLowerCase() < existing.toLowerCase()){ section.insertBefore(label, child); inserted = true; break; }
            }
            if(!inserted){
                const altDiv = document.getElementById('antipastiAltInput');
                if(altDiv) section.insertBefore(label, altDiv);
                else section.appendChild(label);
            }
        }
    } else if(cat === 'primi'){
        const section = document.getElementById('primoSection');
        if(section && !Array.from(section.querySelectorAll('input[name="primo"]')).some(i=>i.value===name)){
            const label = document.createElement('label');
            label.innerHTML = `<input type="radio" name="primo" value="${name}"> ${name}`;
            let inserted = false;
            for(let child of section.querySelectorAll('label')){
                let existing = child.textContent.trim();
                if(name.toLowerCase() < existing.toLowerCase()){ section.insertBefore(label, child); inserted = true; break; }
            }
            if(!inserted){
                const altDiv = document.getElementById('primiAltInput');
                if(altDiv) section.insertBefore(label, altDiv);
                else section.appendChild(label);
            }
        }
    } else if(cat === 'secondi'){
        const section = document.getElementById('secondoSection');
        if(section && !Array.from(section.querySelectorAll('input[name="secondo"]')).some(i=>i.value===name)){
            const label = document.createElement('label');
            label.innerHTML = `<input type="radio" name="secondo" value="${name}"> ${name}`;
            let inserted = false;
            for(let child of section.querySelectorAll('label')){
                let existing = child.textContent.trim();
                if(name.toLowerCase() < existing.toLowerCase()){ section.insertBefore(label, child); inserted = true; break; }
            }
            if(!inserted){
                const altDiv = document.getElementById('secondiAltInput');
                if(altDiv) section.insertBefore(label, altDiv);
                else section.appendChild(label);
            }
        }
    } else if(cat === 'dolci'){
        const section = document.getElementById('dolceSection');
        if(section && !Array.from(section.querySelectorAll('input[name="dolce"]')).some(i=>i.value===name)){
            const label = document.createElement('label');
            label.innerHTML = `<input type="radio" name="dolce" value="${name}"> ${name}`;
            let inserted = false;
            for(let child of section.querySelectorAll('label')){
                let existing = child.textContent.trim();
                if(name.toLowerCase() < existing.toLowerCase()){ section.insertBefore(label, child); inserted = true; break; }
            }
            if(!inserted){
                const altDiv = document.getElementById('dolciAltInput');
                if(altDiv) section.insertBefore(label, altDiv);
                else section.appendChild(label);
            }
        }
    } else if(cat === 'pizza'){
        const section = document.getElementById('pizzaGustoSection');
        if(section && !Array.from(section.querySelectorAll('button.choice-button')).some(b=>b.textContent.trim()===name)){
            const btn = document.createElement('button');
            btn.className = 'choice-button';
            btn.textContent = name;
            btn.onclick = function(){ scegliGustoPizza(name); };
            let inserted = false;
            for(let child of section.querySelectorAll('button.choice-button')){
                let existing = child.textContent.trim();
                if(name.toLowerCase() < existing.toLowerCase()){ section.insertBefore(btn, child); inserted = true; break; }
            }
            if(!inserted){
                const altDiv = document.getElementById('pizzaAltInput');
                if(altDiv) section.insertBefore(btn, altDiv);
                else section.appendChild(btn);
            }
        }
        ordine.pizza = 'yes'; ordine.tipoPizza = 'casa'; ordine.pizzaGusto = name;
    }
    const mapHide = { pizza:'pizzaAltInput', antipasti:'antipastiAltInput', primi:'primiAltInput', secondi:'secondiAltInput', dolci:'dolciAltInput' };
    const hid = document.getElementById(mapHide[cat]); if(hid) hid.classList.add('hidden');
    try{ if(cat==='pizza') document.getElementById('pizzaGustoAltro').value='';
          if(cat==='antipasti') document.getElementById('antipastoAltro').value='';
          if(cat==='primi') document.getElementById('primoAltro').value='';
          if(cat==='secondi') document.getElementById('secondoAltro').value='';
          if(cat==='dolci') document.getElementById('dolceAltro').value=''; }catch(e){}
}

function renderFirebaseOptions(cat, data){
    // Carica tutte le opzioni da Firebase e le aggiunge (senza duplicati)
    let items = data || {};
    Object.keys(items).forEach((k)=>{
        let name = decodeURIComponent(k);
        addOptionToUI(cat, name);
    });
}

function setupFirebaseListeners(){
    if(!window.db || !db.ref) {
        setTimeout(setupFirebaseListeners, 500);
        return;
    }
    ['antipasti','primi','secondi','dolci','pizza'].forEach(cat=>{
        // Leggi subito una volta (al caricamento)
        db.ref(cat).once('value', snap => {
            let val = snap.val() || {};
            renderFirebaseOptions(cat, val);
        });
        // Poi registra listener realtime per aggiornamenti live
        db.ref(cat).on('value', snap => {
            let val = snap.val() || {};
            renderFirebaseOptions(cat, val);
        });
    });
}

window.addEventListener('DOMContentLoaded', function(){ 
    setupFirebaseListeners();
});
