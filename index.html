<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Richiesta Nome</title>
<style>
    body {
        font-family: 'Comic Sans MS', cursive, sans-serif;
        background: linear-gradient(135deg, #ff7eb3, #ff65a3, #ff3385);
        background-size: 400% 400%;
        animation: gradientAnimation 10s ease infinite;
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        text-align: center;
    }
    @keyframes gradientAnimation {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }
    h1 { font-size: 2.5em; animation: bounce 2s infinite; }
    @keyframes bounce { 0%,100%{transform:translateY(0);}50%{transform:translateY(-20px);} }
    .container {
        background-color: rgba(255,255,255,0.7);
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        width: 100%;
        max-width: 400px;
        display: flex;
        flex-direction: column;
        align-items: center;
        animation: fadeIn 2s ease;
    }
    @keyframes fadeIn { from {opacity:0;} to {opacity:1;} }
    input[type="text"] {
        font-size: 1.2em;
        padding: 10px;
        margin: 15px 0;
        border: none;
        border-radius: 10px;
        outline: none;
        transition: transform 0.3s ease-in-out;
        width: 80%;
    }
    input[type="text"]:focus { transform: scale(1.05); border: 2px solid #ff3385; }
    button {
        background-color: #ff3385;
        color: white;
        border: none;
        padding: 15px 30px;
        font-size: 1.2em;
        border-radius: 10px;
        cursor: pointer;
        transition: transform 0.2s, background-color 0.3s ease;
    }
    button:hover { background-color: #ff65a3; transform: scale(1.1); }
    button:active { transform: scale(1); }
    .button-container { display:flex; justify-content:center; margin-top:20px; }
</style>
</head>
<body>
<div class="container">
    <h1>Benvenuto! Inserisci il tuo nome</h1>
    <form id="nameForm">
        <label for="name" style="font-size: 1.5em;">Nome:</label>
        <input type="text" id="name" name="name" required>
        <div class="button-container">
            <button type="submit">Avanti</button>
        </div>
    </form>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

// Configurazione Firebase
const firebaseConfig = {
    apiKey: "AIzaSyBUY-spueXuNmiUew_83Ww3BzP2_kQ0wT0",
    authDomain: "manu-dbc85.firebaseapp.com",
    databaseURL: "https://manu-dbc85-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "manu-dbc85",
    storageBucket: "manu-dbc85.firebasestorage.app",
    messagingSenderId: "1081477129666",
    appId: "1:1081477129666:web:e483d7ab2a26e5ed5ca25b",
    measurementId: "G-E1MNRMW7M5"
};

// Inizializza Firebase
const app = initializeApp(firebaseConfig);
const database = getDatabase(app);

// Funzione per gestire l'invio del nome
function checkName(event) {
    event.preventDefault();

    const userName = document.getElementById("name").value.trim();

    // Blocca se non viene inserito il nome
    if (userName.length === 0) {
        alert("Devi inserire un nome prima di procedere!");
        document.getElementById("name").focus();
        return;
    }

    const lowerName = userName.toLowerCase();

    if (lowerName === "reset") {
        set(ref(database, 'menu'), null)
            .then(() => alert("Il menu è stato resettato con successo!"))
            .catch(err => {
                console.error(err);
                alert("Errore nel resettare il menu. Controlla la console.");
            });
        return;
    }

    localStorage.setItem('nome', userName);

    if (lowerName === "giulia" || lowerName === "giada") {
        window.location.href = "no.html";
    } else {
        window.location.href = "menu.html";
    }
}

// Collega la funzione al submit del form
document.getElementById('nameForm').addEventListener('submit', checkName);
</script>
</body>
</html>
